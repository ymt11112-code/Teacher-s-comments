<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生評語 AI 助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fade-in 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // 简单的图标组件（使用 Unicode 符号）
        const Icon = ({ children, size = 18, className = "" }) => (
            <span className={className} style={{ fontSize: size, display: 'inline-flex', alignItems: 'center' }}>
                {children}
            </span>
        );
        
        const Users = (props) => <Icon {...props}>👥</Icon>;
        const Palette = (props) => <Icon {...props}>🎨</Icon>;
        const BarChart3 = (props) => <Icon {...props}>📊</Icon>;
        const UserCircle = (props) => <Icon {...props}>👤</Icon>;
        const Copy = (props) => <Icon {...props}>📋</Icon>;
        const Sparkles = (props) => <Icon {...props}>✨</Icon>;
        const MessageSquare = (props) => <Icon {...props}>💬</Icon>;
        const ClipboardCheck = (props) => <Icon {...props}>✅</Icon>;
        const PlusCircle = (props) => <Icon {...props}>➕</Icon>;
        const Settings = (props) => <Icon {...props}>⚙️</Icon>;

        const App = () => {
            // --- 全域狀態 ---
            const [activeTab, setActiveTab] = useState('students');
            const [students, setStudents] = useState([]);
            const [inputMode, setInputMode] = useState('list');
            const [rawStudentData, setRawStudentData] = useState('');
            const [studentCount, setStudentCount] = useState(0);
            
            // --- 風格設定狀態 ---
            const [styleConfig, setStyleConfig] = useState({
                selectedStyles: ["親切溫暖", "鼓勵讚賞"],
                customStyle: '',
                wordLimit: '150'
            });

            // --- 成績狀態 ---
            const [scores, setScores] = useState({}); 
            const [examPeriod, setExamPeriod] = useState('midterm'); // midterm | final
            const [currentScoreSubject, setCurrentScoreSubject] = useState('國語');
            const [rawScoreInput, setRawScoreInput] = useState('');

            // --- 特質與個人化狀態 ---
            const [traits, setTraits] = useState({}); 
            const [extraTraits, setExtraTraits] = useState({}); 
            const [individualStyle, setIndividualStyle] = useState({}); 
            
            const [selectedStudentId, setSelectedStudentId] = useState(null);
            const [traitSubTabs, setTraitSubTabs] = useState({
                attitude: 'good',
                social: 'good',
                personality: '甲', // 改為甲、乙、丙
                learning: '優' // 改為優、中下
            });
            
            // --- 特質分頁狀態 ---
            const [traitPages, setTraitPages] = useState({
                attitude: 0,
                social: 0,
                personality: 0,
                learning: 0
            });
            
            // --- Gemini API 狀態 ---
            const [geminiApiKey, setGeminiApiKey] = useState('');
            const [generatedComments, setGeneratedComments] = useState({}); // 存储每个学生生成的评语
            const [isGenerating, setIsGenerating] = useState(false);
            
            // --- 學生名單收放狀態 ---
            const [isStudentListCollapsed, setIsStudentListCollapsed] = useState(false);

            // --- Google Sheets / GAS 狀態 ---
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('gasUrl') || '');
            const [sheetUrl, setSheetUrl] = useState(() => localStorage.getItem('sheetUrl') || '');
            const [sheetConnected, setSheetConnected] = useState(false);
            const [isLoadingSheet, setIsLoadingSheet] = useState(false);
            const [scoresLoaded, setScoresLoaded] = useState(false);
            const [sheetLoadStatus, setSheetLoadStatus] = useState('');
            const [parsedGenComments, setParsedGenComments] = useState({});
            const [finalComments, setFinalComments] = useState({});
            const [saveStatus, setSaveStatus] = useState({});

            // --- 切換到成績頁籤時自動讀取 ---
            useEffect(() => {
                if (activeTab === 'scores' && gasUrl.trim() && sheetUrl.trim() && !scoresLoaded && !isLoadingSheet) {
                    loadScoresFromSheet();
                }
            }, [activeTab]);

            // --- 資料處理：學生清單 ---
            useEffect(() => {
                if (inputMode === 'list' && rawStudentData) {
                    const lines = rawStudentData.trim().split('\n');
                    const parsed = lines.map((line, index) => {
                        const parts = line.split(/\s+/);
                        return {
                            id: parts[0] || (index + 1).toString(),
                            name: parts[1] || `學生${index + 1}`,
                            title: parts[2] || '',
                        };
                    });
                    setStudents(parsed);
                    if (parsed.length > 0 && !selectedStudentId) setSelectedStudentId(parsed[0].id);
                } else if (inputMode === 'count') {
                    const count = parseInt(studentCount) || 0;
                    const parsed = Array.from({ length: count }, (_, i) => ({
                        id: (i + 1).toString(),
                        name: `座號${i + 1}`,
                        title: '',
                    }));
                    setStudents(parsed);
                    if (parsed.length > 0 && !selectedStudentId) setSelectedStudentId(parsed[0].id);
                }
            }, [rawStudentData, studentCount, inputMode, selectedStudentId]);

            // --- 成績匯入邏輯 ---
            const handleImportScores = () => {
                if (!rawScoreInput.trim()) return;
                const lines = rawScoreInput.trim().split('\n');
                const newScores = { ...scores };
                
                lines.forEach(line => {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length < 2) return;

                    const studentIdOrNo = parts[0];
                    const studentName = parts[1];
                    const targetStudent = students.find(s => s.id === studentIdOrNo || s.name === studentName);
                    
                    if (targetStudent) {
                        if (!newScores[targetStudent.id]) newScores[targetStudent.id] = { midterm: {}, final: {} };
                        
                        let detail = {};
                        if (currentScoreSubject === '國語') {
                            detail = {
                                attitude: parts[2], workbook: parts[3], note: parts[4], hw: parts[5], 
                                dictation: parts[6], sheet: parts[7], quiz: parts[8], daily: parts[9], 
                                exam: parts[10], avg: parts[11], rank: parts[12]
                            };
                        } else if (currentScoreSubject === '數學') {
                            detail = {
                                attitude: parts[2], textbookAvg: parts[3], workbookAvg: parts[4], hw: parts[5],
                                heavyAvg: parts[6], sheetAvg: parts[7], paperQuiz: parts[8], daily: parts[9],
                                exam: parts[10], avg: parts[11], rank: parts[12]
                            };
                        } else {
                            detail = { daily: parts[2], exam: parts[3] };
                        }
                        newScores[targetStudent.id][examPeriod][currentScoreSubject] = detail;
                    }
                });
                
                setScores(newScores);
                alert(`已完成 ${examPeriod === 'midterm' ? '期中' : '期末'}-${currentScoreSubject} 成績匯入，系統將自動計算各分項名次。`);
                setRawScoreInput('');
            };

            // --- 自動計算名次邏輯 ---
            const calculatedRanks = useMemo(() => {
                const ranks = {}; 
                const periods = ['midterm', 'final'];
                const subjects = ['國語', '數學', '社會', '自然'];
                
                periods.forEach(p => {
                    ranks[p] = {};
                    subjects.forEach(sub => {
                        ranks[p][sub] = {};
                        
                        const fields = sub === '國語' ? ['attitude', 'workbook', 'note', 'hw', 'dictation', 'sheet', 'quiz', 'daily', 'exam', 'avg'] :
                                       sub === '數學' ? ['attitude', 'textbookAvg', 'workbookAvg', 'hw', 'heavyAvg', 'sheetAvg', 'paperQuiz', 'daily', 'exam', 'avg'] :
                                       ['daily', 'exam'];

                        fields.forEach(field => {
                            const scoreList = students.map(s => {
                                const val = scores[s.id]?.[p]?.[sub]?.[field];
                                return { id: s.id, score: parseFloat(val) };
                            }).filter(item => !isNaN(item.score));

                            if (scoreList.length > 0) {
                                scoreList.sort((a, b) => b.score - a.score);
                                ranks[p][sub][field] = {};
                                let currentRank = 0;
                                let lastScore = null;
                                scoreList.forEach((item, index) => {
                                    if (item.score !== lastScore) {
                                        currentRank = index + 1;
                                    }
                                    ranks[p][sub][field][item.id] = currentRank;
                                    lastScore = item.score;
                                });
                            }
                        });
                    });
                });
                return ranks;
            }, [scores, students]);

            // --- GAS API 呼叫 ---
            const callGAS = async (params) => {
                const url = new URL(gasUrl.trim());
                url.searchParams.set('sheetUrl', sheetUrl.trim());
                Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
                const res = await fetch(url.toString(), { redirect: 'follow' });
                const json = await res.json();
                if (!json.ok) throw new Error(json.error || '未知錯誤');
                return json.data;
            };

            const connectToSheet = async () => {
                if (!gasUrl.trim()) { alert('請輸入 GAS 部署網址'); return; }
                if (!sheetUrl.trim()) { alert('請輸入 Google Sheet 網址'); return; }
                setIsLoadingSheet(true);
                setSheetLoadStatus('');
                try {
                    const data = await callGAS({ action: 'getStudents' });
                    if (!data || data.length === 0) throw new Error('工作表中無學生資料');
                    setStudents(data);
                    setSelectedStudentId(data[0].id);
                    setSheetConnected(true);
                    setSheetLoadStatus(`成功讀取 ${data.length} 位學生`);
                    const comments = await callGAS({ action: 'getComments' });
                    if (comments && Object.keys(comments).length > 0) {
                        const parsed = {}, finals = {};
                        Object.entries(comments).forEach(([id, d]) => {
                            if (d && typeof d === 'object') {
                                parsed[id] = { gen1: d.gen1 || '', gen2: d.gen2 || '', gen3: d.gen3 || '' };
                                if (d.final) finals[id] = d.final;
                            }
                        });
                        setParsedGenComments(prev => ({ ...prev, ...parsed }));
                        setFinalComments(prev => ({ ...prev, ...finals }));
                    }
                } catch (err) {
                    setSheetLoadStatus('連結失敗：' + err.message);
                    setSheetConnected(false);
                } finally {
                    setIsLoadingSheet(false);
                }
            };

            const loadScoresFromSheet = async () => {
                if (!gasUrl.trim()) { alert('請先連結 Google Sheets'); return; }
                setIsLoadingSheet(true);
                setSheetLoadStatus('');
                try {
                    const data = await callGAS({ action: 'getScores' });
                    setScores(data);
                    setScoresLoaded(true);
                    setSheetLoadStatus(`已讀取 ${Object.keys(data).length} 位學生的成績`);
                } catch (err) {
                    setScoresLoaded(false);
                    setSheetLoadStatus('讀取失敗：' + err.message);
                } finally {
                    setIsLoadingSheet(false);
                }
            };

            // --- 解析 Gemini 輸出成三則 ---
            const parseThreeComments = (text) => {
                if (!text) return ['', '', ''];
                // 嘗試按中文序號分割（評語一/二/三 或 則一/二/三）
                let parts = text.split(/\n?\s*(?:\*\*)?(?:評語|則)[一二三](?:：|:)?(?:\*\*)?\s*\n?/);
                if (parts.length >= 4) return [parts[1]?.trim()||'', parts[2]?.trim()||'', parts[3]?.trim()||''];
                // 嘗試阿拉伯數字分割
                parts = text.split(/\n\s*[（(]?[1-3][）).、]\s*/);
                if (parts.length >= 4) return [parts[1]?.trim()||'', parts[2]?.trim()||'', parts[3]?.trim()||''];
                // 嘗試段落分割（兩個以上空行）
                const paras = text.trim().split(/\n{2,}/).filter(p => p.trim());
                if (paras.length >= 3) return [paras[0]?.trim()||'', paras[1]?.trim()||'', paras[2]?.trim()||''];
                return [text.trim(), '', ''];
            };

            const saveCommentToSheet = async (studentId, rawComment) => {
                if (!gasUrl.trim()) return;
                const student = students.find(s => s.id === studentId);
                if (!student) return;
                const [gen1, gen2, gen3] = parseThreeComments(rawComment);
                setParsedGenComments(prev => ({ ...prev, [studentId]: { gen1, gen2, gen3 } }));
                try {
                    await callGAS({
                        action: 'saveComment',
                        id: studentId,
                        name: student.name,
                        gen1: encodeURIComponent(gen1),
                        gen2: encodeURIComponent(gen2),
                        gen3: encodeURIComponent(gen3)
                    });
                    alert('3 則評語已儲存至 Google Sheets！');
                } catch (err) {
                    alert('儲存失敗：' + err.message);
                }
            };

            const saveFinalCommentToSheet = async (studentId, comment) => {
                if (!gasUrl.trim()) return;
                setSaveStatus(prev => ({ ...prev, [studentId]: 'saving' }));
                try {
                    await callGAS({ action: 'saveFinalComment', id: studentId, comment: encodeURIComponent(comment) });
                    setSaveStatus(prev => ({ ...prev, [studentId]: 'saved' }));
                } catch (err) {
                    setSaveStatus(prev => ({ ...prev, [studentId]: 'error' }));
                }
            };

            const handleFinalCommentChange = (studentId, value) => {
                setFinalComments(prev => ({ ...prev, [studentId]: value }));
                setSaveStatus(prev => ({ ...prev, [studentId]: 'pending' }));
                const timerKey = `_saveTimer_${studentId}`;
                if (window[timerKey]) clearTimeout(window[timerKey]);
                window[timerKey] = setTimeout(() => saveFinalCommentToSheet(studentId, value), 1500);
            };

            const downloadTemplate = () => {
                const bom = '﻿';
                const csv = [
                    '# 請依照以下格式在 Google Sheets 建立各工作表（名稱需完全吻合）',
                    '',
                    '# ===== 國語 工作表 =====',
                    '座號,姓名,期中態度,期中國習,期中筆記,期中作業,期中聽寫,期中考卷,期中平時測驗,期中平時成績,期中月考成績,期中平均,期中排名,期末態度,期末國習,期末筆記,期末作業,期末聽寫,期末考卷,期末平時測驗,期末平時成績,期末月考成績,期末平均,期末排名',
                    '1,範例學生,90,85,80,88,92,78,86,84,90,86,3,88,83,79,87,91,80,84,83,89,85,2',
                    '',
                    '# ===== 數學 工作表 =====',
                    '座號,姓名,期中態度,期中數課平均,期中數習平均,期中作業,期中數重平均,期中考卷平均,期中紙筆測驗,期中平時成績,期中月考成績,期中平均,期中排名,期末態度,期末數課平均,期末數習平均,期末作業,期末數重平均,期末考卷平均,期末紙筆測驗,期末平時成績,期末月考成績,期末平均,期末排名',
                    '1,範例學生,88,82,79,90,85,88,84,86,88,87,4,90,84,81,92,87,89,86,88,91,89,3',
                    '',
                    '# ===== 社會 工作表 =====',
                    '座號,姓名,期中平時成績,期中月考成績,期末平時成績,期末月考成績',
                    '1,範例學生,85,90,88,92',
                    '',
                    '# ===== 自然 工作表 =====',
                    '座號,姓名,期中平時成績,期中月考成績,期末平時成績,期末月考成績',
                    '1,範例學生,82,88,85,91',
                    '',
                    '# ===== 評語 工作表（由系統自動建立）=====',
                    '座號,姓名,評語',
                    '1,範例學生,（由系統自動填入）'
                ].join('\n');
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'GoogleSheet範本格式.csv';
                a.click();
                URL.revokeObjectURL(url);
            };

            const styleOptions = ["親切溫暖", "嚴謹專業", "幽默風趣", "簡潔俐落", "鼓勵讚賞", "偏重品德", "偏重學科", "建設性批評", "家長導向", "正向積極", "文青感",  "強調潛力", "具體細節"];

            const traitData = {
                attitude: {
                    good: ["資質優異", "態度積極", "反應敏捷", "受教感強", "踏實努力", "虛心受教", "領悟力佳", "表現穩定", "態度誠懇", "求知慾強", "自律性高", "進取心強", "目標明確", "思維嚴謹", "專注力強", "主動提問", "效率卓越", "勇於嘗試", "持之以恆", "追求卓越", "適應力強", "熱愛學習"],
                    bad: ["資質平凡", "仍須努力", "領悟力弱", "反應較遲", "態度散漫", "缺乏鬥志", "容易分心", "自以為是", "難納雅言", "依賴心重", "意志薄弱", "得過且過", "消極應付", "畏懼困難", "缺乏興趣", "定性不足", "心浮氣躁", "敷衍了事", "欠缺計畫", "慣於藉口", "自我設限", "耐心欠缺"]
                },
                social: {
                    good: ["待人親切", "人緣極佳", "熱心助人", "領導力強", "遵守紀律", "合群守法", "體貼他人", "善於溝通", "樂於分享", "具責任感", "處事公正", "謙恭有禮", "情緒穩定", "善解人意", "團隊核心", "溝通橋樑", "誠實信用", "包容心強", "尊師重道", "廣結善緣", "樂觀大方", "不計名利"],
                    bad: ["個性孤僻", "不善交際", "斤斤計較", "主觀意識", "不聽勸告", "調皮好動", "愛捉弄人", "受人影響", "情緒波動", "缺乏誠信", "行事衝動", "社交畏縮", "固執見", "言行乖張", "喜歡爭執", "缺乏同理", "好勝心強", "容易退縮", "防衛心重", "排斥群體", "容易遷怒", "人際疏離"]
                },
                personality: {
                    甲: ["活潑大方", "敦厚誠摯", "沉穩明辨", "善良同情", "開朗陽光", "幽默風趣", "細心體貼", "柔順親切", "成熟穩重", "正直仗義", "溫和樂天", "純真可愛", "忠誠律己", "剛正正義", "熱情活潑", "天賦敏捷"],
                    乙: ["溫和順從", "沉默寡言", "拘謹內向", "一板一眼", "瑕不掩瑜", "外向好動", "創造力強", "隨和相處", "親切耐心", "乖巧聽話", "資質優異", "平凡踏實", "耿直變通", "文靜平易", "忠厚老實", "乖巧文靜"],
                    丙: ["保守木訥", "內向多愁", "心直口快", "直率粗枝", "內向害羞", "主觀意識", "賣弄聰明", "聰明不用心", "缺乏主見", "性情悲觀", "定性不足", "性格不成熟", "膽怯缺乏自信", "小氣計較", "膽小受脅迫", "調皮好動"]
                },
                learning: {
                    優: ["天資聰穎", "自動自發", "積極主動", "追根究柢", "求學認真", "舉一反三", "作業完成", "樂於切磋", "名列前茅", "專心聽講", "共同討論", "主動探索", "態度嚴謹", "表現出眾", "頗有潛力", "數理較強", "專業待加強", "力圖上進", "自我督促", "按部就班", "漸入佳境", "按時繳交", "向人請教", "頭腦靈活", "熱衷研究", "掌握進度", "態度良好", "善盡職責", "善用時間", "表現佳但粗心"],
                    中下: ["表現平平", "宜多用心", "態度散漫", "差強人意", "缺乏效率", "不知變通", "不夠深入", "有始無終", "進步空間", "心不在焉", "常會發呆", "不太專心", "作業遲交", "外務太多", "希望積極", "記憶無法融會", "態度不夠認真"]
                }
            };

            const toggleTrait = (studentId, category, trait) => {
                setTraits(prev => {
                    const studentTraits = prev[studentId] || { personality: [], learning: [], attitude: [], social: [] };
                    const currentCategory = studentTraits[category] || [];
                    const newCategory = currentCategory.includes(trait)
                        ? currentCategory.filter(t => t !== trait)
                        : [...currentCategory, trait];
                    return { ...prev, [studentId]: { ...studentTraits, [category]: newCategory } };
                });
            };

            const currentStudent = students.find(s => s.id === selectedStudentId);
            
            // --- 獲取學生已選特質 ---
            const getStudentSelectedTraits = (studentId) => {
                if (!studentId) return [];
                const studentTraits = traits[studentId] || { personality: [], learning: [], attitude: [], social: [] };
                const allTraits = [
                    ...(studentTraits.personality || []),
                    ...(studentTraits.learning || []),
                    ...(studentTraits.attitude || []),
                    ...(studentTraits.social || [])
                ];
                return allTraits;
            };
            
            // --- 清除學生所有特質 ---
            const clearStudentTraits = (studentId) => {
                if (!confirm('確定要清除此學生的所有特質嗎？')) return;
                setTraits(prev => {
                    const newTraits = { ...prev };
                    delete newTraits[studentId];
                    return newTraits;
                });
                setExtraTraits(prev => {
                    const newExtra = { ...prev };

【學生背景】

性格特質：${finalTraits.length > 0 ? finalTraits.join('、') : '尚未標記'}

※ 格式：分數 (第X名) 表示該學生在該分項（如國習、聽寫）的表現位階。

${formatPeriod('midterm')}

(2) 期末考階段表現：
${formatPeriod('final')}

請生成 3 則期末評語。`.trim();

                                                                </>
                                                            )}
                                                        </button>
                                                        
                                                        {/* 顯示生成的評語 */}
                                                        {generatedComments[currentStudent.id] && (
                                                            <div className="mt-6 bg-white border border-purple-200 rounded-xl p-6 shadow-sm">
                                                                <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                                                    <h5 className="font-bold text-purple-700">✨ 生成的評語</h5>
                                                                    <div className="flex gap-2 flex-wrap">
                                                                        <button
                                                                            onClick={() => copyToClipboard(generatedComments[currentStudent.id])}
                                                                            className="px-4 py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 text-sm font-bold flex items-center gap-2"
                                                                        >
                                                                            <Copy size={16} /> 複製評語
                                                                        </button>
                                                                        {gasUrl && (
                                                                            <button
                                                                                onClick={() => saveCommentToSheet(currentStudent.id, generatedComments[currentStudent.id])}
                                                                                className="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 text-sm font-bold flex items-center gap-2"
                                                                            >
                                                                                💾 儲存至試算表
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                                <div className="text-sm leading-relaxed text-slate-700 whitespace-pre-wrap border-t border-purple-100 pt-4">
                                                                    {generatedComments[currentStudent.id]}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )
                                        ) : <div className="h-full flex items-center justify-center text-slate-300 italic">請在左側選擇學生</div>}
                                    </div>
                                </div>
                            )}


                            {/* 頁面：評語審閱 */}
                            {activeTab === 'review' && (
                                <div className="flex h-full animate-in fade-in" style={{minHeight: 580}}>
                                    {/* 左側全班列表 */}
                                    <div className="w-64 border-r border-slate-100 bg-slate-50/50 flex flex-col flex-shrink-0">
                                        <div className="p-4 border-b bg-white">
                                            <h3 className="font-bold text-slate-700">全班列表</h3>
                                            <p className="text-xs text-slate-400 mt-1">
                                                {students.filter(s => finalComments[s.id]?.trim()).length} / {students.length} 已完成正式評語
                                            </p>
                                        </div>
                                        <div className="flex-1 overflow-y-auto">
                                            {students.length === 0 ? (
                                                <p className="p-4 text-sm text-slate-400 italic">請先建立學生名單</p>
                                            ) : students.map(s => {
                                                const hasFinal = !!(finalComments[s.id]?.trim());
                                                const hasGen = !!(parsedGenComments[s.id]?.gen1 || generatedComments[s.id]);
                                                return (
                                                    <button key={s.id}
                                                        onClick={() => setSelectedStudentId(s.id)}
                                                        className={`w-full text-left px-4 py-3 border-b transition-all ${selectedStudentId === s.id ? 'bg-white border-l-4 border-l-indigo-600 font-bold text-indigo-700 shadow-sm' : 'hover:bg-slate-100 text-slate-600'}`}
                                                    >
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-sm">{s.id}. {s.name}</span>
                                                            <span className={`text-xs font-bold ${hasFinal ? 'text-green-600' : hasGen ? 'text-amber-500' : 'text-slate-300'}`}>
                                                                {hasFinal ? '✓' : hasGen ? '●' : '○'}
                                                            </span>
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* 右側編輯區 */}
                                    <div className="flex-1 p-6 overflow-y-auto">
                                        {currentStudent ? (
                                            <div className="max-w-2xl mx-auto space-y-5">
                                                {/* 頂部導航 */}
                                                <div className="flex justify-between items-center">
                                                    <h3 className="text-xl font-bold text-slate-800">{currentStudent.name} 的評語</h3>
                                                    <div className="flex gap-2">
                                                        <button onClick={goToPreviousStudent} className="px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 font-bold text-sm transition-all">← 上一位</button>
                                                        <button onClick={goToNextStudent} className="px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 font-bold text-sm transition-all">下一位 →</button>
                                                    </div>
                                                </div>

                                                {/* 三則生成評語 */}
                                                {[1,2,3].map(n => {
                                                    const text = parsedGenComments[currentStudent.id]?.[`gen${n}`] ||
                                                                 (n === 1 && !parsedGenComments[currentStudent.id] ? generatedComments[currentStudent.id] : '');
                                                    if (!text) return null;
                                                    return (
                                                        <div key={n} className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">生成評語 {n}</span>
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => copyToClipboard(text)} className="px-3 py-1 bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-100 text-xs font-bold transition-all">複製</button>
                                                                    <button onClick={() => handleFinalCommentChange(currentStudent.id, text)} className="px-3 py-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-xs font-bold transition-all">套用為正式</button>
                                                                </div>
                                                            </div>
                                                            <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{text}</p>
                                                        </div>
                                                    );
                                                })}

                                                {/* 尚無生成評語提示 */}
                                                {!parsedGenComments[currentStudent.id]?.gen1 && !generatedComments[currentStudent.id] && (
                                                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-700 text-center">
                                                        此學生尚未生成評語，請先到「生成指令」頁籤產生
                                                    </div>
                                                )}

                                                {/* 正式評語編輯區 */}
                                                <div className="bg-white rounded-xl p-5 border-2 border-indigo-200 shadow-sm">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <label className="font-bold text-indigo-700 flex items-center gap-2">✏️ 正式評語</label>
                                                        <span className={`text-xs font-bold px-2 py-1 rounded-full ${
                                                            saveStatus[currentStudent.id] === 'saving' ? 'bg-amber-100 text-amber-600' :
                                                            saveStatus[currentStudent.id] === 'saved'  ? 'bg-green-100 text-green-600' :
                                                            saveStatus[currentStudent.id] === 'error'  ? 'bg-red-100 text-red-600' :
                                                            saveStatus[currentStudent.id] === 'pending' ? 'bg-slate-100 text-slate-400' : ''
                                                        }`}>
                                                            {saveStatus[currentStudent.id] === 'saving'  ? '儲存中...' :
                                                             saveStatus[currentStudent.id] === 'saved'   ? '✓ 已儲存' :
                                                             saveStatus[currentStudent.id] === 'error'   ? '✗ 儲存失敗' :
                                                             saveStatus[currentStudent.id] === 'pending' ? '未儲存' : ''}
                                                        </span>
                                                    </div>
                                                    <textarea
                                                        value={finalComments[currentStudent.id] || ''}
                                                        onChange={(e) => handleFinalCommentChange(currentStudent.id, e.target.value)}
                                                        className="w-full p-3 rounded-lg border border-slate-200 text-sm leading-relaxed outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
                                                        style={{minHeight: 160}}
                                                        placeholder={gasUrl ? '輸入後 1.5 秒自動儲存至 Google Sheets...' : '（請先連結 Google Sheets 才能自動儲存）'}
                                                    />
                                                    {gasUrl && (
                                                        <button
                                                            onClick={() => saveFinalCommentToSheet(currentStudent.id, finalComments[currentStudent.id] || '')}
                                                            className="mt-3 w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition-all shadow-sm"
                                                        >
                                                            💾 立即儲存
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-300 italic">請在左側選擇學生</div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // 渲染應用程式 - 等待 DOM 和所有脚本加载完成
        function initApp() {
            try {
                // 检查必要的库是否已加载
                if (typeof React === 'undefined') {
                    throw new Error('React 未加载');
                }
                if (typeof ReactDOM === 'undefined') {
                    throw new Error('ReactDOM 未加载');
                }
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('找不到 root 元素');
                }
                
                // 使用 ReactDOM.render（Babel 会将 JSX 转换为 React.createElement）
                ReactDOM.render(<App />, rootElement);
            } catch (error) {
                console.error('渲染错误:', error);
                console.error('错误堆栈:', error.stack);
                const rootElement = document.getElementById('root');
                if (rootElement) {
                    rootElement.innerHTML = '<div style="padding: 20px; color: red; font-family: Arial; background: #fee; border: 2px solid red; border-radius: 8px; margin: 20px;">' +
                        '<h2>加载错误</h2>' +
                        '<p>错误信息: ' + error.message + '</p>' +
                        '<p>请按 F12 打开浏览器控制台查看详细错误信息。</p>' +
                        '<p>确保网络连接正常，能够访问 CDN 资源。</p>' +
                        '</div>';
                }
            }
        }
        
        // 如果 DOM 已经加载完成，立即执行；否则等待
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initApp);
        } else {
            // DOM 已经加载完成，延迟一点确保所有脚本都加载了
            setTimeout(initApp, 100);
        }
    </script>
</body>
</html>

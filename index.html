<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生評語 AI 助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fade-in 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // 简单的图标组件（使用 Unicode 符号）
        const Icon = ({ children, size = 18, className = "" }) => (
            <span className={className} style={{ fontSize: size, display: 'inline-flex', alignItems: 'center' }}>
                {children}
            </span>
        );
        
        const Users = (props) => <Icon {...props}>👥</Icon>;
        const Palette = (props) => <Icon {...props}>🎨</Icon>;
        const BarChart3 = (props) => <Icon {...props}>📊</Icon>;
        const UserCircle = (props) => <Icon {...props}>👤</Icon>;
        const Copy = (props) => <Icon {...props}>📋</Icon>;
        const Sparkles = (props) => <Icon {...props}>✨</Icon>;
        const MessageSquare = (props) => <Icon {...props}>💬</Icon>;
        const ClipboardCheck = (props) => <Icon {...props}>✅</Icon>;
        const PlusCircle = (props) => <Icon {...props}>➕</Icon>;
        const Settings = (props) => <Icon {...props}>⚙️</Icon>;

        const App = () => {
            // --- 全域狀態 ---
            const [activeTab, setActiveTab] = useState('students');
            const [students, setStudents] = useState([]);
            const [inputMode, setInputMode] = useState('list');
            const [rawStudentData, setRawStudentData] = useState('');
            const [studentCount, setStudentCount] = useState(0);
            
            // --- 風格設定狀態 ---
            const [styleConfig, setStyleConfig] = useState({
                selectedStyles: ["親切溫暖", "鼓勵讚賞"],
                customStyle: '',
                wordLimit: '150'
            });

            // --- 成績狀態 ---
            const [scores, setScores] = useState({}); 
            const [examPeriod, setExamPeriod] = useState('midterm'); // midterm | final
            const [currentScoreSubject, setCurrentScoreSubject] = useState('國語');
            const [rawScoreInput, setRawScoreInput] = useState('');

            // --- 特質與個人化狀態 ---
            const [traits, setTraits] = useState({});
            const [extraTraits, setExtraTraits] = useState({});
            const [individualStyle, setIndividualStyle] = useState({});
            const [counselingData, setCounselingData] = useState({});
            const [narrativeTraits, setNarrativeTraits] = useState({});
            const [activeNarrativeTab, setActiveNarrativeTab] = useState('蛻變');
            
            const [selectedStudentId, setSelectedStudentId] = useState(null);
            const [traitSubTabs, setTraitSubTabs] = useState({ '1':'green', '2':'green', '3':'green', '4':'green', '5':'green' });
            const [hoveredCols, setHoveredCols] = useState({ '1':null, '2':null, '3':null, '4':null, '5':null });
            

            // --- Gemini API 狀態 ---
            const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem('geminiApiKey') || '');
            const [generatedComments, setGeneratedComments] = useState({}); // 存储每个学生生成的评语
            const [isGenerating, setIsGenerating] = useState(false);
            const [retryCountdown, setRetryCountdown] = useState(0);
            const retryTimerRef = useRef(null);
            const abortControllerRef = useRef(null);
            const [activeGeminiModel, setActiveGeminiModel] = useState('');
            // 去除因 B1~B4 重複儲存造成的段落重複
            const dedupeTemplate = (tmpl) => {
                if (!tmpl) return tmpl;
                const headers = ['【引言】', '【學生背景】', '【學業成就分析', '【撰寫指南】'];
                for (const h of headers) {
                    const first = tmpl.indexOf(h);
                    if (first === -1) continue;
                    const second = tmpl.indexOf(h, first + h.length);
                    if (second !== -1) return tmpl.slice(0, second).trim();
                }
                return tmpl;
            };
            const [promptTemplate, setPromptTemplate] = useState(() => dedupeTemplate(localStorage.getItem('promptTemplate') || ''));
            const [isSavingTemplate, setIsSavingTemplate] = useState(false);
            
            // --- 學生名單收放狀態 ---
            const [isStudentListCollapsed, setIsStudentListCollapsed] = useState(false);

            // --- Google Sheets / GAS 狀態 ---
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('gasUrl') || '');
            const [sheetUrl, setSheetUrl] = useState(() => localStorage.getItem('sheetUrl') || '');
            const [sheetConnected, setSheetConnected] = useState(false);
            const [isLoadingSheet, setIsLoadingSheet] = useState(false);
            const [scoresLoaded, setScoresLoaded] = useState(false);
            const [sheetLoadStatus, setSheetLoadStatus] = useState('');
            const [parsedGenComments, setParsedGenComments] = useState({});
            const [finalComments, setFinalComments] = useState({});
            const [saveStatus, setSaveStatus] = useState({});
            const [trafficLights, setTrafficLights] = useState({});
            const [loadedTraitData, setLoadedTraitData]     = useState(null);
            const [traitDataLoaded, setTraitDataLoaded]     = useState(false);
            const [traitDataLoading, setTraitDataLoading]   = useState(false);
            const [editingDim, setEditingDim]               = useState(null);
            const [editDraft, setEditDraft]                 = useState({});
            const [traitSaveToast, setTraitSaveToast]       = useState(null);

            // --- 頁面載入時若已有網址，自動連線 ---
            useEffect(() => {
                if (gasUrl.trim() && sheetUrl.trim()) {
                    connectToSheet();
                }
            }, []);

            // --- 切換到成績頁籤時自動讀取 ---
            useEffect(() => {
                if (activeTab === 'scores' && gasUrl.trim() && sheetUrl.trim() && !scoresLoaded && !isLoadingSheet) {
                    loadScoresFromSheet();
                }
            }, [activeTab]);

            // --- 首次進入特質挑選 tab 自動從 GAS 載入特質庫 ---
            useEffect(() => {
                if (activeTab === '特質挑選' && !traitDataLoaded && !traitDataLoading && gasUrl.trim() && sheetUrl.trim()) {
                    loadTraitData();
                }
            }, [activeTab]);

            // --- 資料處理：學生清單 ---
            useEffect(() => {
                if (inputMode === 'list' && rawStudentData) {
                    const lines = rawStudentData.trim().split('\n');
                    const parsed = lines.map((line, index) => {
                        const parts = line.split(/\s+/);
                        return {
                            id: parts[0] || (index + 1).toString(),
                            name: parts[1] || `學生${index + 1}`,
                            title: parts[2] || '',
                        };
                    });
                    setStudents(parsed);
                    if (parsed.length > 0 && !selectedStudentId) setSelectedStudentId(parsed[0].id);
                } else if (inputMode === 'count') {
                    const count = parseInt(studentCount) || 0;
                    const parsed = Array.from({ length: count }, (_, i) => ({
                        id: (i + 1).toString(),
                        name: `座號${i + 1}`,
                        title: '',
                    }));
                    setStudents(parsed);
                    if (parsed.length > 0 && !selectedStudentId) setSelectedStudentId(parsed[0].id);
                }
            }, [rawStudentData, studentCount, inputMode, selectedStudentId]);

            // --- 成績匯入邏輯 ---
            const handleImportScores = () => {
                if (!rawScoreInput.trim()) return;
                const lines = rawScoreInput.trim().split('\n');
                const newScores = { ...scores };
                
                lines.forEach(line => {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length < 2) return;

                    const studentIdOrNo = parts[0];
                    const studentName = parts[1];
                    const targetStudent = students.find(s => s.id === studentIdOrNo || s.name === studentName);
                    
                    if (targetStudent) {
                        if (!newScores[targetStudent.id]) newScores[targetStudent.id] = { midterm: {}, final: {} };
                        
                        let detail = {};
                        if (currentScoreSubject === '國語') {
                            detail = {
                                attitude: parts[2], workbook: parts[3], note: parts[4], hw: parts[5], 
                                dictation: parts[6], sheet: parts[7], quiz: parts[8], daily: parts[9], 
                                exam: parts[10], avg: parts[11], rank: parts[12]
                            };
                        } else if (currentScoreSubject === '數學') {
                            detail = {
                                attitude: parts[2], textbookAvg: parts[3], workbookAvg: parts[4], hw: parts[5],
                                heavyAvg: parts[6], sheetAvg: parts[7], paperQuiz: parts[8], daily: parts[9],
                                exam: parts[10], avg: parts[11], rank: parts[12]
                            };
                        } else {
                            detail = { daily: parts[2], exam: parts[3] };
                        }
                        newScores[targetStudent.id][examPeriod][currentScoreSubject] = detail;
                    }
                });
                
                setScores(newScores);
                alert(`已完成 ${examPeriod === 'midterm' ? '期中' : '期末'}-${currentScoreSubject} 成績匯入，系統將自動計算各分項名次。`);
                setRawScoreInput('');
            };

            // --- 自動計算名次邏輯 ---
            const calculatedRanks = useMemo(() => {
                const ranks = {}; 
                const periods = ['midterm', 'final'];
                const subjects = ['國語', '數學', '社會', '自然'];
                
                periods.forEach(p => {
                    ranks[p] = {};
                    subjects.forEach(sub => {
                        ranks[p][sub] = {};
                        
                        const fields = sub === '國語' ? ['attitude', 'workbook', 'note', 'hw', 'dictation', 'sheet', 'quiz', 'daily', 'exam', 'avg'] :
                                       sub === '數學' ? ['attitude', 'textbookAvg', 'workbookAvg', 'hw', 'heavyAvg', 'sheetAvg', 'paperQuiz', 'daily', 'exam', 'avg'] :
                                       ['daily', 'exam'];

                        fields.forEach(field => {
                            const scoreList = students.map(s => {
                                const val = scores[s.id]?.[p]?.[sub]?.[field];
                                return { id: s.id, score: parseFloat(val) };
                            }).filter(item => !isNaN(item.score));

                            if (scoreList.length > 0) {
                                scoreList.sort((a, b) => b.score - a.score);
                                ranks[p][sub][field] = {};
                                let currentRank = 0;
                                let lastScore = null;
                                scoreList.forEach((item, index) => {
                                    if (item.score !== lastScore) {
                                        currentRank = index + 1;
                                    }
                                    ranks[p][sub][field][item.id] = currentRank;
                                    lastScore = item.score;
                                });
                            }
                        });
                    });
                });
                return ranks;
            }, [scores, students]);

            // --- base64 編碼（縮短長文字在 URL 中的長度）---
            const b64Enc = (str) => {
                if (!str) return '';
                try {
                    const b64 = btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p) =>
                        String.fromCharCode(parseInt(p, 16))
                    ));
                    return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
                } catch(e) { return encodeURIComponent(str); }
            };

            // --- GAS API 呼叫 ---
            const callGAS = async (params) => {
                const url = new URL(gasUrl.trim());
                url.searchParams.set('sheetUrl', sheetUrl.trim());
                Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
                const res = await fetch(url.toString(), { redirect: 'follow' });
                const json = await res.json();
                if (!json.ok) throw new Error(json.error || '未知錯誤');
                return json.data;
            };

            const connectToSheet = async () => {
                if (!gasUrl.trim()) { alert('請輸入 GAS 部署網址'); return; }
                if (!sheetUrl.trim()) { alert('請輸入 Google Sheet 網址'); return; }
                setIsLoadingSheet(true);
                setSheetLoadStatus('');
                try {
                    const data = await callGAS({ action: 'getStudents' });
                    if (!data || data.length === 0) throw new Error('工作表中無學生資料');
                    setStudents(data);
                    setSelectedStudentId(data[0].id);
                    setSheetConnected(true);
                    setSheetLoadStatus(`成功讀取 ${data.length} 位學生`);
                    const comments = await callGAS({ action: 'getComments' });
                    if (comments && Object.keys(comments).length > 0) {
                        const parsed = {}, finals = {};
                        Object.entries(comments).forEach(([id, d]) => {
                            if (d && typeof d === 'object') {
                                parsed[id] = { preamble: '', gen1: d.gen1 || '', gen2: d.gen2 || '', gen3: d.gen3 || '' };
                                if (d.final) finals[id] = d.final;
                            }
                        });
                        setParsedGenComments(prev => ({ ...prev, ...parsed }));
                        setFinalComments(prev => ({ ...prev, ...finals }));
                    }
                    try {
                        const tmpl = await callGAS({ action: 'getPromptTemplate' });
                        if (tmpl) { const clean = dedupeTemplate(tmpl); setPromptTemplate(clean); localStorage.setItem('promptTemplate', clean); }
                    } catch(e) { /* 無提示詞工作表時忽略 */ }
                } catch (err) {
                    setSheetLoadStatus('連結失敗：' + err.message);
                    setSheetConnected(false);
                } finally {
                    setIsLoadingSheet(false);
                }
            };

            const loadScoresFromSheet = async () => {
                if (!gasUrl.trim()) { alert('請先連結 Google Sheets'); return; }
                setIsLoadingSheet(true);
                setSheetLoadStatus('');
                try {
                    const data = await callGAS({ action: 'getScores' });
                    setScores(data);
                    setScoresLoaded(true);
                    setSheetLoadStatus(`已讀取 ${Object.keys(data).length} 位學生的成績`);
                } catch (err) {
                    setScoresLoaded(false);
                    setSheetLoadStatus('讀取失敗：' + err.message);
                } finally {
                    setIsLoadingSheet(false);
                }
            };

            // --- 解析 Gemini 輸出成三則（含引言）---
            const parseThreeComments = (text) => {
                if (!text) return { preamble:'', gen1:'', gen2:'', gen3:'' };
                // 去掉 Gemini 有時加的 **學生姓名：** 和分隔線
                const strip = (s) => (s||'').replace(/\*{0,2}學生姓名[：:][^\n]*\*{0,2}\n?/g,'').replace(/^[-\s]*\n/m,'').trim();
                let parts;
                // 第X則評語 format（最常見）
                parts = text.split(/\n?\s*\*{0,2}第[一二三]則評語[：:]\*{0,2}\s*\n?/);
                if (parts.length >= 4) return { preamble:strip(parts[0]), gen1:parts[1]?.trim()||'', gen2:parts[2]?.trim()||'', gen3:parts[3]?.trim()||'' };
                // 評語一／則一 format
                parts = text.split(/\n?\s*\*{0,2}(?:評語|則)[一二三][：:]?\*{0,2}\s*\n?/);
                if (parts.length >= 4) return { preamble:strip(parts[0]), gen1:parts[1]?.trim()||'', gen2:parts[2]?.trim()||'', gen3:parts[3]?.trim()||'' };
                // 【評語 1】 / 【評語1】 format
                parts = text.split(/\n?\s*\*{0,2}【評語\s*[1-3一二三]】\*{0,2}\s*\n?/);
                if (parts.length >= 4) return { preamble:strip(parts[0]), gen1:parts[1]?.trim()||'', gen2:parts[2]?.trim()||'', gen3:parts[3]?.trim()||'' };
                // **N. 學生名** bold numbered header (with or without --- separators)
                parts = text.split(/\n\s*(?:---+\s*\n\s*)?\*\*[1-3][.．、。]\s*[^\n]*\*\*\s*\n?/);
                if (parts.length >= 4) {
                    const cleanEnd = s => (s||'').replace(/\s*---+\s*$/, '').trim();
                    return { preamble:strip(parts[0]), gen1:cleanEnd(parts[1]), gen2:cleanEnd(parts[2]), gen3:cleanEnd(parts[3]) };
                }
                // 阿拉伯數字
                parts = text.split(/\n\s*[（(]?[1-3][）).、]\s*/);
                if (parts.length >= 4) return { preamble:strip(parts[0]), gen1:parts[1]?.trim()||'', gen2:parts[2]?.trim()||'', gen3:parts[3]?.trim()||'' };
                // 段落
                const paras = text.trim().split(/\n{2,}/).filter(p=>p.trim());
                if (paras.length >= 3) return { preamble:'', gen1:paras[0]?.trim()||'', gen2:paras[1]?.trim()||'', gen3:paras[2]?.trim()||'' };
                return { preamble:'', gen1:text.trim(), gen2:'', gen3:'' };
            };

            const saveCommentToSheet = async (studentId, rawComment) => {
                if (!gasUrl.trim()) return;
                const student = students.find(s => s.id === studentId);
                if (!student) return;
                const { preamble, gen1, gen2, gen3 } = parseThreeComments(rawComment);
                setParsedGenComments(prev => ({ ...prev, [studentId]: { preamble, gen1, gen2, gen3 } }));
                try {
                    await callGAS({
                        action: 'saveComment',
                        id: studentId,
                        name: student.name,
                        gen1: b64Enc(gen1),
                        gen2: b64Enc(gen2),
                        gen3: b64Enc(gen3)
                    });
                    alert('3 則評語已儲存至 Google Sheets！');
                } catch (err) {
                    alert('儲存失敗：' + err.message);
                }
            };

            const savePromptTemplateToSheet = async (tmpl) => {
                // 先存 localStorage
                localStorage.setItem('promptTemplate', tmpl);
                setPromptTemplate(tmpl);

                if (!gasUrl.trim()) {
                    alert('提示詞已儲存至瀏覽器！');
                    return;
                }

                setIsSavingTemplate(true);
                try {
                    // 按固定段落標題分割，分別存到對應格子
                    const sectionHeaders = ['【引言】', '【學生背景】', '【學業成就分析', '【撰寫指南】'];
                    const sectionLabels  = ['B1(引言)', 'B2(學生背景)', 'B3(學業成就分析)', 'B4(撰寫指南)'];
                    const positions = sectionHeaders.map(h => tmpl.indexOf(h));
                    const parts = sectionHeaders.map((h, i) => {
                        const start = positions[i];
                        if (start === -1) return '';
                        const nextStart = positions.slice(i + 1).filter(p => p > start).sort((a,b)=>a-b)[0];
                        return nextStart !== undefined
                            ? tmpl.slice(start, nextStart).trim()
                            : tmpl.slice(start).trim();
                    });
                    for (let i = 0; i < 4; i++) {
                        await callGAS({
                            action: 'savePromptCell',
                            cell: i + 1,
                            value: b64Enc(parts[i] || '')
                        });
                    }
                    alert('提示詞已儲存至試算表：\n' + sectionLabels.map((l,i) => `${l}：${parts[i] ? '✓' : '（空）'}`).join('\n'));
                } catch(err) {
                    alert('儲存至試算表失敗：' + err.message + '\n\n提示詞已保留在瀏覽器中。');
                } finally {
                    setIsSavingTemplate(false);
                }
            };

            const saveFinalCommentToSheet = async (studentId, comment) => {
                if (!gasUrl.trim()) return;
                setSaveStatus(prev => ({ ...prev, [studentId]: 'saving' }));
                try {
                    await callGAS({ action: 'saveFinalComment', id: studentId, comment: b64Enc(comment) });
                    setSaveStatus(prev => ({ ...prev, [studentId]: 'saved' }));
                } catch (err) {
                    setSaveStatus(prev => ({ ...prev, [studentId]: 'error' }));
                }
            };

            const handleFinalCommentChange = (studentId, value) => {
                setFinalComments(prev => ({ ...prev, [studentId]: value }));
                setSaveStatus(prev => ({ ...prev, [studentId]: 'pending' }));
                const timerKey = `_saveTimer_${studentId}`;
                if (window[timerKey]) clearTimeout(window[timerKey]);
                window[timerKey] = setTimeout(() => saveFinalCommentToSheet(studentId, value), 1500);
            };

            const createTemplateSheet = async () => {
                if (!gasUrl.trim()) {
                    alert('請先填入 GAS 部署網址，才能建立副本。');
                    return;
                }
                setIsLoadingSheet(true);
                setSheetLoadStatus('');
                try {
                    const data = await callGAS({ action: 'createTemplate' });
                    window.open(data.url, '_blank');
                    setSheetUrl(data.url);
                    localStorage.setItem('sheetUrl', data.url);
                    setScoresLoaded(false);
                    setSheetConnected(false);
                    setSheetLoadStatus('副本已建立並開啟！建議先重新命名，再點「讀取名單」');
                } catch (err) {
                    setSheetLoadStatus('建立失敗：' + err.message);
                } finally {
                    setIsLoadingSheet(false);
                }
            };

            const styleOptions = ["親切溫暖", "嚴謹專業", "幽默風趣", "簡潔俐落", "鼓勵讚賞", "偏重品德", "偏重學科", "建設性批評", "家長導向", "正向積極", "文青感",  "強調潛力", "具體細節"];

            // 每個子分類 25 項，排列順序對應 5 欄格局：
            // 欄1=天賦/感知  欄2=動力/態度  欄3=自律/習慣  欄4=受教/互動  欄5=表現/成果
            const traitData = {
                attitude: {
                    // 欄1:資質感知  欄2:學習動力  欄3:自律堅持  欄4:受教謙遜  欄5:表現效率
                    good: [
                        "資質優異", "求知慾強", "自律性高", "虛心受教", "踏實努力",
                        "反應敏捷", "熱愛學習", "目標明確", "受教感強", "進取心強",
                        "領悟力佳", "態度積極", "持之以恆", "態度誠懇", "效率卓越",
                        "思維嚴謹", "主動提問", "專注力強", "善於反思", "表現穩定",
                        "觀察敏銳", "勇於嘗試", "意志堅定", "適應力強", "追求卓越"
                    ],
                    // 欄1:資質感知弱  欄2:動力興趣弱  欄3:自律意志弱  欄4:受教態度弱  欄5:表現結果弱
                    bad: [
                        "資質平凡", "缺乏鬥志", "意志薄弱", "態度散漫", "仍須努力",
                        "反應較遲", "缺乏興趣", "容易分心", "自以為是", "依賴心重",
                        "領悟力弱", "消極應付", "耐心欠缺", "難納雅言", "畏懼困難",
                        "定性不足", "得過且過", "心浮氣躁", "慣於藉口", "缺乏主動",
                        "思路不清", "自我設限", "欠缺計畫", "敷衍了事", "粗心大意"
                    ]

            // --- 特質庫：從 GAS 載入 ---
            const loadTraitData = async () => {
                if (!gasUrl.trim() || !sheetUrl.trim()) return;
                setTraitDataLoading(true);
                try {
                    const res = await fetch(`${gasUrl}?action=getTraitData&sheetUrl=${encodeURIComponent(sheetUrl)}`);
                    const json = await res.json();
                    if (json.ok && json.data) {
                        const dimMap = {}, dimOrder = [];
                        const splitKw = arr => arr.flatMap(s => s.split(/[、,]/).map(x=>x.trim().replace(/。$/,'')).filter(Boolean));
                        json.data.forEach(row => {
                            if (!dimMap[row.dimId]) { dimMap[row.dimId] = { id:row.dimId, name:row.dimName, subs:[] }; dimOrder.push(row.dimId); }
                            dimMap[row.dimId].subs.push({ id:row.subId, name:row.subName, green:splitKw(row.green), yellow:splitKw(row.yellow), red:splitKw(row.red) });
                        });
                        setLoadedTraitData(dimOrder.map(id => dimMap[id]));
                    }
                    setTraitDataLoaded(true);
                } catch(e) { console.error('loadTraitData', e); }
                finally { setTraitDataLoading(false); }
            };

                    const parse = s => s.split(/[\n、,]/).map(x=>x.trim().replace(/。$/,'')).filter(Boolean);
                    // 先把本次修改合進完整 trafficLightData
                    const updatedData = trafficLightData.map(d => {
                        if (d.id !== dim.id) return d;
                        return { ...d, subs: d.subs.map(s => {
                            const dr = editDraft[s.id];
                            if (!dr) return s;
                            return { id:s.id, name: dr.name ?? s.name,
                                green:  dr.green  !== undefined ? parse(dr.green)  : s.green,
                                yellow: dr.yellow !== undefined ? parse(dr.yellow) : s.yellow,
                                red:    dr.red    !== undefined ? parse(dr.red)    : s.red };
                        })};
                    });
                    // 只送本次修改的向度 5 列（GET 請求，避免 POST CORS 問題）
                    const dimIndex = (loadedTraitData || defaultTrafficLightData).findIndex(d => d.id === dim.id);
                    const updatedDim = updatedData.find(d => d.id === dim.id);
                    const rows5 = updatedDim.subs.map(s => ({
                        dimId: updatedDim.id, dimName: updatedDim.name,
                        subId: s.id, subName: s.name,
                        green: s.green.join('、'), yellow: s.yellow.join('、'), red: s.red.join('、')
                    }));
                    const params = new URLSearchParams({
                        action: 'saveTraitDim', sheetUrl,
                        dimIndex: String(dimIndex),
                        data: b64Enc(JSON.stringify(rows5))
                    });
                    const res = await fetch(`${gasUrl}?${params}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    if (!json.ok) throw new Error(json.error || '未知錯誤');
                    // 成功後更新 local state
                    setLoadedTraitData(updatedData);
                    setEditingDim(null);
                    setEditDraft({});
                    setTraitSaveToast({ ok:true, msg:'已成功儲存至試算表' });

                if (generatedComments[studentId]) return true;
                // 檢查是否有選擇特質

                if (studentTraits) {
                    const hasTraits = Object.values(studentTraits).some(category =>

                    if (hasTraits) return true;

                if (score === undefined || score === null || score === "") return "無";
                if (isFinalRank) return score; 
                const rank = calculatedRanks[period]?.[subject]?.[field]?.[studentId];
                return rank ? `${score} (第${rank}名)` : score;
            };

            const formatScoreToChinese = (studentId, period, subject) => {
                const data = scores[studentId]?.[period]?.[subject];
                if (!data) return null;

                const total = students.length || 1;
                const topLine = Math.ceil(total * 0.33);
                const botLine = Math.floor(total * 0.67);

                const getRank = (field) => {
                    const r = calculatedRanks[period]?.[subject]?.[field]?.[studentId];
                    return r ? parseInt(r) : null;
                };
                const getVal = (field) => (data[field] && data[field] !== '') ? data[field] : null;

                const analyzeItems = (items) => {
                    const strong = [], weak = [];
                    const weakMeta = [];
                    items.forEach(({ key, name }) => {
                        const v = getVal(key);
                        const r = getRank(key);
                        if (!v) return;
                        const entry = `${name}${v}(第${r ?? '?'}名)`;
                        if (r && r <= topLine) strong.push(entry);
                        else if (r && r >= botLine) { weak.push(entry); weakMeta.push({ name, rank: r }); }
                    });
                    return { strong, weak, weakMeta };
                };

                const buildLine = (label, items, avg, rank) => {
                    const { strong, weak, weakMeta } = analyzeItems(items);
                    const avgVal = getVal(avg);
                    const avgRank = getRank(avg);
                    const rankVal = getVal(rank);
                    const lines = [`[${label}]`];
                    if (strong.length) lines.push(`  強項：${strong.join('、')}`);
                    if (weak.length)   lines.push(`  弱項：${weak.join('、')}`);
                    // 影響排名因素：找出排名最差的弱項
                    if (weakMeta.length > 0) {
                        const worst = weakMeta.sort((a, b) => b.rank - a.rank)[0];
                        const others = weakMeta.filter(m => m.name !== worst.name).map(m => m.name);
                        const factor = others.length
                            ? `${worst.name}（第${worst.rank}名）為主因，${others.join('、')}亦需加強`
                            : `${worst.name}（第${worst.rank}名）為主要拉低因素`;
                        lines.push(`  影響排名因素：${factor}`);
                    }
                    if (!strong.length && !weak.length) lines.push('  各項表現平均');
                    if (avgVal) lines.push(`  平均${avgVal}（全班第${avgRank ?? rankVal ?? '?'}名）`);
                    return lines.join('\n');
                };

                if (subject === '國語') {
                    return buildLine('國語', [
                        {key:'workbook',name:'國習'},{key:'note',name:'筆記'},
                        {key:'hw',name:'作業'},{key:'dictation',name:'聽寫'},
                        {key:'sheet',name:'考卷'},{key:'quiz',name:'平時測驗'},
                        {key:'daily',name:'平時成績'},{key:'exam',name:'月考'},
                    ], 'avg', 'rank');
                } else if (subject === '數學') {
                    return buildLine('數學', [
                        {key:'textbookAvg',name:'數課'},{key:'workbookAvg',name:'數習'},
                        {key:'hw',name:'作業'},{key:'heavyAvg',name:'數重'},
                        {key:'sheetAvg',name:'考卷'},{key:'paperQuiz',name:'紙筆'},
                        {key:'daily',name:'平時成績'},{key:'exam',name:'月考'},
                    ], 'avg', 'rank');
                } else {
                    const dv = getVal('daily'), ev = getVal('exam');
                    const dr = getRank('daily'), er = getRank('exam');
                    return `[${subject}] 平時：${dv ?? '無'}(第${dr ?? '?'}名)，月考：${ev ?? '無'}(第${er ?? '?'}名)`;
                }
            };

            // --- 彩色渲染提示詞（僅供顯示，不影響送出的文字）---
            const renderColoredPrompt = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    let cls = 'text-slate-700';
                    if (/^\s*強項[：:]/.test(line))         cls = 'text-emerald-700 font-semibold';
                    else if (/^\s*弱項[：:]/.test(line))    cls = 'text-red-600 font-semibold';
                    else if (/^\s*影響排名因素[：:]/.test(line)) cls = 'text-amber-700 font-semibold';
                    else if (/^\[.+\]/.test(line))          cls = 'text-indigo-700 font-bold';
                    else if (/^【.+】/.test(line))          cls = 'text-slate-800 font-bold';
                    else if (/^[（(][0-9１２]/.test(line)) cls = 'text-slate-600 font-bold';
                    return <span key={i} className={cls}>{line}{'\n'}</span>;
                });
            };

            const getFullPrompt = (student) => {
                if (!student) return "";
                const sTraits = traits[student.id] || {};
                const allSelected = trafficLightData.flatMap(dim => sTraits[dim.id] || []);
                const manualTraits = extraTraits[student.id] ? extraTraits[student.id].split(/[，、\s]+/) : [];
                const finalTraits = [...allSelected, ...manualTraits].filter(t => t);
                const counselNote = (counselingData[student.id] || '').trim();
                const traitContext = buildTraitContext(student.id);
                const sNarrative = narrativeTraits[student.id] || {};
                const narrativeLines = ['蛻變','現狀','閃光點','期許'].flatMap(cat =>
                    (sNarrative[cat] || []).map(title => {
                        const item = (narrativeData[cat] || []).find(x => x.t === title);
                        return item ? `【${cat}】${item.t}：${item.d}` : `【${cat}】${title}`;
                    })
                );
                const combinedStyle = [...styleConfig.selectedStyles, individualStyle[student.id] ? `(特別要求：${individualStyle[student.id]})` : ''].filter(s => s).join('、');

                const scoreData = scores[student.id] || { midterm: {}, final: {} };
                
                const formatPeriod = (period) => {
                    const results = ['國語', '數學', '社會', '自然']
                        .map(sub => formatScoreToChinese(student.id, period, sub))
                        .filter(res => res);
                    return results.length > 0 ? results.join('\n') : null;
                };

                const defaultInstruction = `你是一位資深且充滿教育熱忱的國民小學班級導師。請根據以下學生資料，為學生撰寫 3 則期末評語。請確保評語內容具體、語氣通順，並給予學生適當的鼓勵或建議。

【撰寫指南】
1. 風格要求：${combinedStyle || '正向積極、溫暖細緻'}
2. 字數限制：每則約 ${styleConfig.wordLimit} 字
3. 參考範本：${styleConfig.customStyle || '無'}
4. 分析重點：請分析「分項排名」的趨勢，但不要提到真正的名次，並盡量給予具體肯定。

請直接輸出三則評語，格式如下（不需要其他開頭說明）：
評語一：
[評語內容]

評語二：
[評語內容]

評語三：
[評語內容]`;

                const midData = formatPeriod('midterm');
                const finData = formatPeriod('final');

                if (promptTemplate) {
                    // 將 Google Sheets 模板中的欄位填入實際學生資料
                    const subs = ['國語','數學','社會','自然'];
                    const actualStyle = combinedStyle || '正向積極、溫暖細緻';
                    const actualWordLimit = `每則約 ${styleConfig.wordLimit} 字`;
                    const actualExample = styleConfig.customStyle || '無';
                    let result = promptTemplate
                        // {{}} 佔位符
                        .replace(/\{\{風格\}\}/g, actualStyle)
                        .replace(/\{\{字數\}\}/g, actualWordLimit)
                        .replace(/\{\{範本\}\}/g, actualExample)
                        // 「讀取風格設定頁籤的 XXX」描述式佔位符
                        .replace(/讀取風格設定頁籤的[\s　]*全域語氣風格/g, actualStyle)
                        .replace(/讀取風格設定頁籤的[\s　]*評語目標字數/g, actualWordLimit)
                        .replace(/讀取風格設定頁籤的[\s　]*參考範本/g, actualExample)
                        // 填入學生基本資料（配對「欄位名稱：」後方的空白行）
                        .replace(/(座號[：:])[ \t]*(?=\n|$)/gm,
                            `$1${student.id}`)
                        .replace(/(姓名[：:])[ \t]*(?=\n|$)/gm,
                            `$1${student.name}${student.title ? ` (${student.title})` : ''}`)
                        .replace(/(性格特質[：:])[ \t]*(?=\n|$)/gm,
                            `$1${traitContext ? '\n' + traitContext : (finalTraits.length > 0 ? finalTraits.join('、') : '尚未標記')}`);

                    // 找到期中/期末分界，分別替換 [科目] 行
                    const midIdx = result.search(/\(1\)[^\n]*期中/);
                    const finIdx = result.search(/\(2\)[^\n]*期末/);

                    const replaceSubs = (section, period) => {
                        let s = section;
                        subs.forEach(sub => {
                            const actual = formatScoreToChinese(student.id, period, sub);
                            if (actual) {
                                s = s.replace(new RegExp(`\\[${sub}\\][^\\n]*`, 'g'), actual);
                            }
                        });
                        return s;
                    };

                    if (midIdx !== -1) {
                        const endOfMid = finIdx !== -1 ? finIdx : result.length;
                        const replaced = replaceSubs(result.slice(midIdx, endOfMid), 'midterm');
                        result = result.slice(0, midIdx) + replaced + result.slice(endOfMid);
                    }
                    const finIdx2 = result.search(/\(2\)[^\n]*期末/);
                    if (finIdx2 !== -1) {
                        if (finData) {
                            result = result.slice(0, finIdx2) + replaceSubs(result.slice(finIdx2), 'final');
                        } else {
                            // 無期末資料，移除整個期末段落
                            result = result.slice(0, finIdx2).trimEnd();
                        }
                    }
                    // 無期末資料時加禁止假設的明確指示
                    if (!finData) {
                        result = result.trimEnd() + '\n\n⚠️ 重要：本次只有期中成績，沒有期末成績資料。撰寫評語時請勿假設、推測或提及期末考的表現，只根據期中成績描述。';
                    }
                    if (narrativeLines.length > 0) {
                        result += `\n\n📝 敘事觀察（供 AI 撰寫時參考，勿逐字複製）：\n${narrativeLines.join('\n')}`;
                    }
                    if (counselNote) {
                        result += `\n\n📋 輔導觀察備忘（教師私下備注，請作為背景參考，勿直接引用）：\n${counselNote}`;
                    }
                    return result.trim();
                }

                // 使用預設模板（未載入 Google Sheets 提示詞時）
                const scoreLines = [
                    midData ? `(1) 期中考階段表現：\n${midData}` : null,
                    finData ? `(2) 期末考階段表現：\n${finData}` : null,
                ].filter(Boolean).join('\n\n') || '尚未匯入成績。';

                const noFinalNote = !finData ? '\n\n⚠️ 重要：本次只有期中成績，沒有期末成績資料。撰寫評語時請勿假設、推測或提及期末考的表現，只根據期中成績描述。' : '';
                return `${defaultInstruction}

【學生背景】
座號：${student.id}　姓名：${student.name} ${student.title ? `(${student.title})` : ''}
性格特質：${traitContext || (finalTraits.length > 0 ? finalTraits.join('、') : '尚未標記')}${narrativeLines.length > 0 ? `\n\n📝 敘事觀察：\n${narrativeLines.join('\n')}` : ''}${counselNote ? `\n\n📋 輔導備注（請作為背景參考，勿直接引述）：${counselNote}` : ''}

【學業成就分析 (含自動計算之全班分項排名)】
※ 格式：分數 (第X名) 表示該學生在該分項的表現位階。

${scoreLines}${noFinalNote}`.trim();
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('內容已複製！');
                } catch (err) {
                    console.error('複製失敗', err);
                }
                document.body.removeChild(textArea);
            };

            // --- 生成全班提示詞 ---
            const getAllStudentsPrompt = () => {
                if (students.length === 0) {
                    return "尚未建立學生名單。";
                }
                
                let allPrompts = "=== 全班學生評語提示詞 ===\n\n";
                students.forEach((student, index) => {
                    allPrompts += `【學生 ${index + 1}】\n`;
                    allPrompts += getFullPrompt(student);
                    allPrompts += "\n\n" + "=".repeat(50) + "\n\n";
                });
                
                return allPrompts.trim();
            };

            // --- 使用 Gemini API 生成評語 ---
            const generateCommentWithGemini = async (student) => {
                if (!geminiApiKey || !geminiApiKey.trim()) {
                    alert('請先設定 Gemini API Key！\n\n您可以在「風格設定」頁面設定 API Key。');
                    return;
                }
                if (retryCountdown > 0) return;

                setIsGenerating(true);
                const prompt = getFullPrompt(student);
                abortControllerRef.current = new AbortController();

                try {
                    // 查詢可用模型清單
                    const listR = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models?key=${geminiApiKey}`,
                        { signal: abortControllerRef.current.signal }
                    );
                    if (!listR.ok) {
                        const e = await listR.json().catch(() => ({}));
                        throw new Error(`查詢模型失敗 (HTTP ${listR.status})：${e.error?.message || '請確認 API Key 正確'}`);
                    }
                    const listData = await listR.json();
                    const usable = (listData.models || []).filter(m =>
                        m.supportedGenerationMethods?.includes('generateContent') &&
                        /gemini/i.test(m.name) &&
                        !/vision|embedding|aqa/i.test(m.name)
                    );
                    if (usable.length === 0) {
                        const all = (listData.models || []).map(m => m.name).join('\n');
                        throw new Error(`找不到可用的 Gemini 模型。\n全部模型：\n${all}`);
                    }

                    // 依優先順序排列（1.5-flash 最穩定，2.0 次之）
                    const sortedModels = [
                        ...usable.filter(m => /1\.5-flash/i.test(m.name) && !/8b/i.test(m.name)),
                        ...usable.filter(m => /1\.5-pro/i.test(m.name)),
                        ...usable.filter(m => /2\.0-flash(?!.*lite)/i.test(m.name)),
                        ...usable.filter(m => /2\.0/i.test(m.name)),
                        ...usable.filter(m => !/1\.5|2\.0/i.test(m.name)),
                    ];

                    const body = JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] });
                    const headers = { 'Content-Type': 'application/json' };
                    const sig = abortControllerRef.current.signal;
                    let response = null;
                    const tryLog = [];

                    outer: for (const model of sortedModels) {
                        const mid = model.name.replace(/^models\//, '');
                        for (const ver of ['v1', 'v1beta']) {
                            const url = `https://generativelanguage.googleapis.com/${ver}/models/${mid}:generateContent?key=${geminiApiKey}`;
                            const r = await fetch(url, { method: 'POST', headers, body, signal: sig });
                            if (r.ok) {
                                setActiveGeminiModel(`${mid} (${ver})`);
                                response = r;
                                break outer;
                            }
                            const errJson = await r.json().catch(() => ({}));
                            const msg = (errJson.error?.message || `HTTP ${r.status}`).split('\n')[0];
                            const retryMatch = msg.match(/retry in ([\d.]+)s/i);
                            if (retryMatch) {
                                const secs = Math.ceil(parseFloat(retryMatch[1]));
                                tryLog.push(`❌ ${mid} (${ver}): 速率限制 (retry ${secs}s)`);
                                // 速率限制就停止，不繼續試其他模型
                                throw new Error(`速率限制：請等待 ${secs} 秒後再試\n\n已嘗試：\n${tryLog.join('\n')}`);
                            }
                            tryLog.push(`❌ ${mid} (${ver}): ${msg}`);
                        }
                    }
                    if (!response) throw new Error(`所有模型均失敗：\n${tryLog.join('\n')}`);

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `API 錯誤: ${response.status}`);
                    }

                    const data = await response.json();
                    const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || '生成失敗，請重試。';
                    
                    // 存储生成的评语
                    setGeneratedComments(prev => ({
                        ...prev,
                        [student.id]: generatedText
                    }));
                } catch (error) {
                    if (error.name === 'AbortError') { setIsGenerating(false); return; }
                    console.error('生成評語失敗:', error);
                    const secsMatch = error.message.match(/等待\s*(\d+)\s*秒/);
                    if (secsMatch) {
                        const secs = parseInt(secsMatch[1]);
                        setRetryCountdown(secs);
                        if (retryTimerRef.current) clearInterval(retryTimerRef.current);
                        retryTimerRef.current = setInterval(() => {
                            setRetryCountdown(prev => {
                                if (prev <= 1) {
                                    clearInterval(retryTimerRef.current);
                                    retryTimerRef.current = null;
                                    return 0;
                                }
                                return prev - 1;
                            });
                        }, 1000);
                    }
                    // 一律顯示完整錯誤（速率限制也顯示）
                    alert('生成評語失敗：\n\n' + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <h1 className="text-3xl font-bold text-indigo-700 flex items-center gap-2">
                                <Sparkles className="text-indigo-500" /> 學生評語 AI 助手
                            </h1>
                            <nav className="flex bg-white rounded-xl shadow-sm p-1 border border-slate-200 overflow-x-auto">
                                {[
                                    { id: 'students', icon: Users, label: '名單建立' },
                                    { id: 'style', icon: Palette, label: '風格設定' },
                                    { id: 'scores', icon: BarChart3, label: '成績匯入' },
                                    { id: 'traits', icon: UserCircle, label: '特質挑選' },
                                    { id: 'prompt', icon: MessageSquare, label: '生成指令' },
                                    { id: 'review', icon: ClipboardCheck, label: '評語審閱' }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all whitespace-nowrap ${
                                            activeTab === tab.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'
                                        }`}
                                    >
                                        <tab.icon size={18} />
                                        <span className="font-medium text-sm">{tab.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </header>

                        <div className="bg-white rounded-2xl shadow-xl border border-slate-100 min-h-[580px] overflow-hidden flex flex-col">
                            
                            {/* 頁面：學生清單 */}
                            {activeTab === 'students' && (
                                <div className="p-8 h-full flex flex-col animate-in fade-in">
                                    <h2 className="text-xl font-bold mb-6 border-l-4 border-indigo-500 pl-3">第一步：建立學生清單</h2>
                                    <div className="flex gap-4 mb-6 flex-wrap">
                                        <button onClick={() => setInputMode('count')} className={`px-6 py-2 rounded-full border-2 transition-all ${inputMode === 'count' ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-200'}`}>人數輸入</button>
                                        <button onClick={() => setInputMode('list')} className={`px-6 py-2 rounded-full border-2 transition-all ${inputMode === 'list' ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-200'}`}>清單貼上</button>
                                        <button onClick={() => setInputMode('sheet')} className={`px-6 py-2 rounded-full border-2 transition-all ${inputMode === 'sheet' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-slate-200'}`}>📊 Google 試算表</button>
                                    </div>
                                    {inputMode === 'count' ? (
                                        <div className="max-w-xs space-y-2">
                                            <label className="text-sm text-slate-500">輸入班級人數：</label>
                                            <input type="number" value={studentCount} onChange={(e) => setStudentCount(e.target.value)} className="w-full p-4 rounded-xl border border-slate-300 outline-none text-2xl font-bold text-center" />
                                        </div>
                                    ) : inputMode === 'list' ? (
                                        <textarea value={rawStudentData} onChange={(e) => setRawStudentData(e.target.value)} className="flex-1 w-full p-4 rounded-xl border border-slate-300 font-mono text-sm h-64" placeholder="格式：座號 姓名 職務(選填)&#10;1 王小明 班長..." />
                                    ) : (
                                        <div className="max-w-xl space-y-4">
                                            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-700 leading-relaxed space-y-1">
                                                <p className="font-bold">初次設定（只需做一次）</p>
                                                <p>1. 前往 <a href="https://script.google.com" target="_blank" rel="noopener noreferrer" className="underline">script.google.com</a> 建立新專案</p>
                                                <p>2. 貼上 <code className="bg-blue-100 px-1 rounded">Code.gs</code> 的內容並儲存</p>
                                                <p>3. 點「部署 → 新增部署作業」，類型選「網路應用程式」</p>
                                                <p>4. 執行身分「我」、存取對象「所有人」，複製部署 URL</p>
                                                <p className="pt-1 text-blue-500">新學期只需換 Google Sheet 網址，不需重新部署</p>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold mb-2 text-slate-600">GAS 部署網址（一次性設定）</label>
                                                <input
                                                    type="text"
                                                    value={gasUrl}
                                                    onChange={(e) => {
                                                        const v = e.target.value;
                                                        setGasUrl(v);
                                                        localStorage.setItem('gasUrl', v);
                                                        setSheetConnected(false);
                                                        setSheetLoadStatus('');
                                                    }}
                                                    placeholder="https://script.google.com/macros/s/..."
                                                    className="w-full p-3 rounded-xl border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-green-400"
                                                />

                                                    if (!text) return null;
                                                    return (
                                                        <div key={n} className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">生成評語 {n}</span>
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => copyToClipboard(text)} className="px-3 py-1 bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-100 text-xs font-bold transition-all">複製</button>
                                                                    <button onClick={() => handleFinalCommentChange(currentStudent.id, text)} className="px-3 py-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-xs font-bold transition-all">套用為正式</button>
                                                                </div>
                                                            </div>
                                                            <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{text}</p>
                                                        </div>
                                                    );
                                                })}

                                                {/* 尚無生成評語提示 */}
                                                {!parsedGenComments[currentStudent.id]?.gen1 && !generatedComments[currentStudent.id] && (
                                                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-700 text-center">
                                                        此學生尚未生成評語，請先到「生成指令」頁籤產生
                                                    </div>
                                                )}

                                                {/* 正式評語編輯區 */}
                                                <div className="bg-white rounded-xl p-5 border-2 border-indigo-200 shadow-sm">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <label className="font-bold text-indigo-700 flex items-center gap-2">✏️ 正式評語</label>
                                                        <span className={`text-xs font-bold px-2 py-1 rounded-full ${
                                                            saveStatus[currentStudent.id] === 'saving' ? 'bg-amber-100 text-amber-600' :
                                                            saveStatus[currentStudent.id] === 'saved'  ? 'bg-green-100 text-green-600' :
                                                            saveStatus[currentStudent.id] === 'error'  ? 'bg-red-100 text-red-600' :
                                                            saveStatus[currentStudent.id] === 'pending' ? 'bg-slate-100 text-slate-400' : ''
                                                        }`}>
                                                            {saveStatus[currentStudent.id] === 'saving'  ? '儲存中...' :
                                                             saveStatus[currentStudent.id] === 'saved'   ? '✓ 已儲存' :
                                                             saveStatus[currentStudent.id] === 'error'   ? '✗ 儲存失敗' :
                                                             saveStatus[currentStudent.id] === 'pending' ? '未儲存' : ''}
                                                        </span>
                                                    </div>
                                                    <textarea
                                                        value={finalComments[currentStudent.id] || ''}
                                                        onChange={(e) => handleFinalCommentChange(currentStudent.id, e.target.value)}
                                                        className="w-full p-3 rounded-lg border border-slate-200 text-sm leading-relaxed outline-none focus:ring-2 focus:ring-indigo-400 transition-all"
                                                        style={{minHeight: 160}}
                                                        placeholder={gasUrl ? '輸入後 1.5 秒自動儲存至 Google Sheets...' : '（請先連結 Google Sheets 才能自動儲存）'}
                                                    />
                                                    {gasUrl && (
                                                        <button
                                                            onClick={() => saveFinalCommentToSheet(currentStudent.id, finalComments[currentStudent.id] || '')}
                                                            className="mt-3 w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition-all shadow-sm"
                                                        >
                                                            💾 立即儲存
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-300 italic">請在左側選擇學生</div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* ── 特質編輯 Modal ── */}
                    {editingDim && (() => {
                        const dim = trafficLightData.find(d => d.id === editingDim);
                        if (!dim) return null;
                        return (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={e => { if (e.target === e.currentTarget) { setEditingDim(null); setEditDraft({}); } }}>
                                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                                    {/* Modal 標題 */}
                                    <div className="flex items-center justify-between px-6 py-4 border-b border-slate-200">
                                        <h2 className="text-base font-bold text-slate-800">✏️ 編輯特質向度：{dim.id}. {dim.name}</h2>
                                        <button onClick={() => { setEditingDim(null); setEditDraft({}); }} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 font-bold text-lg leading-none">✕</button>
                                    </div>
                                    {/* Modal 內容（可捲動） */}
                                    <div className="overflow-y-auto flex-1 px-6 py-4 space-y-3">
                                        <p className="text-xs text-slate-400">每行輸入一個關鍵字；子項目名稱可直接修改。</p>
                                        {dim.subs.map(sub => {
                                            const dr = editDraft[sub.id] || {};
                                            const setF = (f, v) => setEditDraft(p => ({...p, [sub.id]:{...(p[sub.id]||{}), [f]:v}}));
                                            return (
                                                <div key={sub.id} className="bg-slate-50 rounded-xl p-3 border border-slate-200 space-y-2">
                                                    <input value={dr.name ?? sub.name} onChange={e => setF('name', e.target.value)}
                                                        className="w-full text-sm font-bold border border-slate-300 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300"
                                                        placeholder="子項目名稱" />
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {[['green','🟢 值得肯定'],['yellow','🟡 表現中等'],['red','🔴 待改進']].map(([color, label]) => (
                                                            <div key={color}>
                                                                <div className="text-xs font-bold text-slate-500 mb-1">{label}</div>
                                                                <textarea
                                                                    value={dr[color] ?? sub[color].join('\n')}
                                                                    onChange={e => setF(color, e.target.value)}
                                                                    className="w-full text-xs border border-slate-300 rounded-lg px-2 py-1.5 resize-none bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300 leading-relaxed"
                                                                    rows={6}
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {/* Modal 底部按鈕 */}
                                    <div className="flex gap-3 px-6 py-4 border-t border-slate-200">
                                        <button onClick={() => saveTraitDim(dim)} disabled={traitDataLoading}
                                            className="flex-1 py-2.5 bg-green-500 text-white text-sm font-bold rounded-xl hover:bg-green-600 disabled:opacity-50 transition-all shadow-sm">
                                            {traitDataLoading ? '儲存中…' : '💾 儲存至試算表'}
                                        </button>
                                        <button onClick={() => { setEditingDim(null); setEditDraft({}); }}
                                            className="px-6 py-2.5 bg-slate-200 text-slate-700 text-sm font-bold rounded-xl hover:bg-slate-300 transition-all">
                                            取消
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* ── 儲存結果 Toast ── */}
                    {traitSaveToast && (
                        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] px-6 py-3 rounded-xl shadow-xl text-sm font-bold text-white pointer-events-none transition-all ${traitSaveToast.ok ? 'bg-green-500' : 'bg-red-500'}`}>
                            {traitSaveToast.ok ? '✅ ' : '❌ '}{traitSaveToast.msg}
                        </div>
                    )}

                </div>
            );
        };

        // 渲染應用程式 - 等待 DOM 和所有脚本加载完成
        function initApp() {
            try {
                // 检查必要的库是否已加载
                if (typeof React === 'undefined') {
                    throw new Error('React 未加载');
                }
                if (typeof ReactDOM === 'undefined') {
                    throw new Error('ReactDOM 未加载');
                }
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('找不到 root 元素');
                }
                
                // 使用 ReactDOM.render（Babel 会将 JSX 转换为 React.createElement）
                ReactDOM.render(<App />, rootElement);
            } catch (error) {
                console.error('渲染错误:', error);
                console.error('错误堆栈:', error.stack);
                const rootElement = document.getElementById('root');
                if (rootElement) {
                    rootElement.innerHTML = '<div style="padding: 20px; color: red; font-family: Arial; background: #fee; border: 2px solid red; border-radius: 8px; margin: 20px;">' +
                        '<h2>加载错误</h2>' +
                        '<p>错误信息: ' + error.message + '</p>' +
                        '<p>请按 F12 打开浏览器控制台查看详细错误信息。</p>' +
                        '<p>确保网络连接正常，能够访问 CDN 资源。</p>' +
                        '</div>';
                }
            }
        }
        
        // 如果 DOM 已经加载完成，立即执行；否则等待
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initApp);
        } else {
            // DOM 已经加载完成，延迟一点确保所有脚本都加载了
            setTimeout(initApp, 100);
        }
    </script>
</body>
</html>
